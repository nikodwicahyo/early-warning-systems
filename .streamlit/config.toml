[theme]
primaryColor = "#003d82"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#e9ecef"
textColor = "#212529"
font = "sans serif"

[server]
headless = false
enableCORS = false
enableXsrfProtection = false
port = 8501
maxUploadSize = 100
runOnSave = true
fileWatcherType = "poll"

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
